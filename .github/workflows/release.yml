name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            platform: win32
            arch: x64
            ext: .exe
          - os: macos-latest
            target: x86_64-apple-darwin
            platform: darwin
            arch: x64
            ext: ''
          - os: macos-latest
            target: aarch64-apple-darwin
            platform: darwin
            arch: arm64
            ext: ''
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            platform: linux
            arch: x64
            ext: ''

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
      
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      
      - name: Build
        run: |
          cargo build --release -p director --target ${{ matrix.target }}
      
      - name: Package
        run: |
          mkdir -p packages/jade/binaries/${{ matrix.platform }}/${{ matrix.arch }}
          cp target/${{ matrix.target }}/release/director${{ matrix.ext }} packages/jade/binaries/${{ matrix.platform }}/${{ matrix.arch }}/
          cd packages/jade/binaries/${{ matrix.platform }}/${{ matrix.arch }}
          gzip -9 director${{ matrix.ext }}
          mv director${{ matrix.ext }}.gz director-${{ matrix.target }}${{ matrix.ext }}.gz
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: director-${{ matrix.target }}
          path: packages/jade/binaries/${{ matrix.platform }}/${{ matrix.arch }}/director-${{ matrix.target }}${{ matrix.ext }}.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Download Windows binary
        uses: actions/download-artifact@v4
        with:
          name: director-x86_64-pc-windows-msvc
          path: binaries
      
      - name: Download macOS x64 binary
        uses: actions/download-artifact@v4
        with:
          name: director-x86_64-apple-darwin
          path: binaries
      
      - name: Download macOS arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: director-aarch64-apple-darwin
          path: binaries
      
      - name: Download Linux binary
        uses: actions/download-artifact@v4
        with:
          name: director-x86_64-unknown-linux-gnu
          path: binaries
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: binaries/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-npm:
    needs: release
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        working-directory: packages/jade
        run: npm ci
      
      - name: Build
        working-directory: packages/jade
        run: npm run build
      
      - name: Publish
        working-directory: packages/jade
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
