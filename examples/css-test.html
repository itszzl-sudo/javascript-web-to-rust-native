<!DOCTYPE html>
<html>
<head>
<style>
body {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    margin: 0;
    padding: 20px;
}
h1 {
    color: white;
    text-align: center;
    font-size: 48px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
}
.box {
    width: 200px;
    height: 200px;
    background: #ff6b6b;
    border-radius: 20px;
    margin: 20px auto;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}
.circle {
    width: 100px;
    height: 100px;
    background: #4ecdc4;
    border-radius: 50%;
    margin: 20px auto;
}
.text {
    color: white;
    font-size: 24px;
    text-align: center;
    padding: 20px;
    background: rgba(255,255,255,0.1);
    border-radius: 10px;
    margin: 20px;
}
</style>
</head>
<body>
    <h1>CSS Render Test</h1>
    <div class="box"></div>
    <div class="circle"></div>
    <div class="text">If you see gradient background and colored shapes, CSS is working</div>
</body>
</html>
